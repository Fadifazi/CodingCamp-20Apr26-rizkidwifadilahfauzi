<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Name Modal -->
  <div id="name-modal" class="modal hidden">
    <div class="modal-box">
      <h2>What's your name?</h2>
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="30" />
      <div class="modal-actions">
        <button id="name-save">Save</button>
        <button id="name-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Header: Greeting -->
  <header>
    <section id="greeting-section">
      <h1 id="greeting-text">Hello!</h1>
      <p id="datetime-text"></p>
    </section>
    <div class="header-controls">
      <button id="theme-toggle">Dark Mode</button>
      <button id="name-btn">Set Name</button>
    </div>
  </header>

  <main>

    <!-- Focus Timer -->
    <section id="timer-section">
      <h2>Focus Timer</h2>
      <div id="timer-display">25:00</div>
      <div class="timer-settings">
        <label for="custom-minutes">Set minutes:</label>
        <input type="number" id="custom-minutes" min="1" max="99" value="25" />
      </div>
      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section id="todo-section">
      <h2>To-Do List</h2>
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Add a task..." maxlength="100" />
        <button id="todo-add">Add</button>
      </div>
      <div class="todo-sort-row">
        <label for="todo-sort">Sort:</label>
        <select id="todo-sort">
          <option value="default">Default</option>
          <option value="az">A to Z</option>
          <option value="za">Z to A</option>
          <option value="done">Done last</option>
        </select>
      </div>
      <ul id="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section id="links-section">
      <h2>Quick Links</h2>
      <div class="link-input-row">
        <input type="text" id="link-name-input" placeholder="Label" maxlength="30" />
        <input type="url" id="link-url-input" placeholder="https://..." />
        <button id="link-add">Add</button>
      </div>
      <div id="links-container"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
